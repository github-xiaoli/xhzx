<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 器材组成员管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px;">
        <div class="header">
            <a href="../index.html">返回首页</a>
            <h1>器材组成员管理系统</h1>
            <p>请登录以继续</p>
        </div>
        
        <div id="alert" class="alert hidden"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn" style="width: 100%;">登录</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const alertDiv = document.getElementById('alert');
            alertDiv.className = 'alert hidden';
            
            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = '登录成功！正在跳转...';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    alertDiv.className = 'alert alert-error';
                    alertDiv.textContent = data.error || '登录失败';
                }
            } catch (error) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '网络错误，请稍后重试';
            }
        });
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/users/current');
                const data = await response.json();
                
                if (data.username) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                // 忽略错误
            }
        }
        
        checkLogin();
    </script>
</body>
</html>
