<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 器材组成员管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo">
                <h1>个人资料</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn btn-secondary">返回首页</a>
                <button onclick="logout()" class="logout-btn">退出登录</button>
            </div>
        </div>
        
        <div id="alert" class="alert hidden"></div>
        
        <div class="header">
            <h2>我的资料</h2>
            <div class="user-info">修改个人信息和密码</div>
        </div>
        
        <div id="profileInfo" class="hidden">
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>用户名</h3>
                    <div class="number" id="profileUsername">-</div>
                </div>
                <div class="dashboard-card">
                    <h3>当前分数</h3>
                    <div class="number" id="profileScore">0</div>
                </div>
                <div class="dashboard-card">
                    <h3>用户角色</h3>
                    <div id="profileRole">-</div>
                </div>
                <div class="dashboard-card">
                    <h3>注册时间</h3>
                    <div id="profileCreated">-</div>
                </div>
            </div>
            
            <div style="margin-top: 25px;">
                <h3>修改密码</h3>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label for="old_password">原密码</label>
                        <input type="password" id="old_password" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="new_password">新密码</label>
                        <input type="password" id="new_password" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">确认新密码</label>
                        <input type="password" id="confirm_password" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-success">修改密码</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div id="loading" class="loading">
            加载中...
        </div>
    </div>

    <script>
        let currentUser = null;
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/users/current');
                const data = await response.json();
                
                if (!data.username) {
                    window.location.href = 'login.html';
                    return;
                }
                
                currentUser = data;
                loadProfile();
            } catch (error) {
                window.location.href = 'login.html';
            }
        }
        
        function loadProfile() {
            document.getElementById('profileUsername').textContent = 
                currentUser.real_name || currentUser.username;
            document.getElementById('profileScore').textContent = 
                currentUser.score || '0';
            document.getElementById('profileRole').textContent = 
                currentUser.role === 'root' ? '管理员' : 
                currentUser.role === 'user' ? '用户' : '访客';
            document.getElementById('profileCreated').textContent = 
                currentUser.created || '-';
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('profileInfo').style.display = 'block';
        }
        
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const oldPassword = document.getElementById('old_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (newPassword !== confirmPassword) {
                showAlert('两次输入的新密码不一致', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('新密码至少6位', 'error');
                return;
            }
            
            const alertDiv = document.getElementById('alert');
            alertDiv.className = 'alert hidden';
            
            try {
                const response = await fetch('/api/users/change_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = '密码修改成功！';
                    
                    document.getElementById('changePasswordForm').reset();
                } else {
                    alertDiv.className = 'alert alert-error';
                    alertDiv.textContent = data.error || '密码修改失败';
                }
            } catch (error) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '网络错误，请稍后重试';
            }
        });
        
        async function logout() {
            try {
                await fetch('/api/users/logout', {
                    method: 'POST'
                });
                window.location.href = 'login.html';
            } catch (error) {
                window.location.href = 'login.html';
            }
        }
        
        function showAlert(message, type = 'info') {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.className = 'alert hidden';
            }, 3000);
        }
        
        window.onload = checkLogin;
    </script>
</body>
</html>
