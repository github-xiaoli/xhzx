<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扣分 - 器材组成员管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo">
                <h1>扣分管理</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn btn-secondary">返回首页</a>
                <button onclick="logout()" class="logout-btn">退出登录</button>
            </div>
        </div>
        
        <div id="alert" class="alert hidden"></div>
        
        <div class="header">
            <h2>新增扣分记录</h2>
            <div class="user-info">请填写扣分信息</div>
        </div>
        
        <form id="deductForm">
            <div class="form-group">
                <label for="target_user">被扣分人 *</label>
                <select id="target_user" class="form-control" required>
                    <option value="">请选择被扣分人</option>
                </select>
                <small id="userPermissionInfo" class="text-muted"></small>
            </div>
            
            <div class="form-group">
                <label for="points">扣分分值 *</label>
                <input type="number" id="points" class="form-control" min="1" max="100" required>
                <small class="text-muted">1-100之间的整数</small>
            </div>
            
            <div class="form-group">
                <label for="reason">扣分原因</label>
                <textarea id="reason" class="form-control" rows="3" placeholder="请输入扣分原因..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="image">图片佐证（可选）</label>
                <input type="file" id="image" class="form-control" accept="image/*">
                <div id="imagePreview" class="image-preview hidden"></div>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-success">提交扣分</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">取消</button>
            </div>
        </form>
    </div>

    <script>
        let currentUser = null;
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/users/current');
                const data = await response.json();
                
                if (!data.username) {
                    window.location.href = 'login.html';
                    return;
                }
                
                currentUser = data;
                
                if (currentUser.role === 'guest') {
                    showAlert('访客没有扣分权限', 'error');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    return;
                }
                
                await loadUsers();
                applyUrlParams();
            } catch (error) {
                window.location.href = 'login.html';
            }
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/users/list');
                const data = await response.json();
                
                if (response.ok) {
                    const userSelect = document.getElementById('target_user');
                    while (userSelect.options.length > 1) {
                        userSelect.remove(1);
                    }
                    
                    const allUsers = data.users || [];
                    const permissionInfo = document.getElementById('userPermissionInfo');
                    
                    // 权限规则：除访客外所有人都可以互相扣分
                    // 所以管理员和普通用户都可以选择所有用户作为扣分对象
                    
                    if (currentUser.role === 'root' || currentUser.role === 'user') {
                        // 显示所有用户（包括自己、其他管理员、普通用户、访客）
                        allUsers.forEach(user => {
                            const option = document.createElement('option');
                            option.value = user.username;
                            
                            // 显示用户角色
                            let roleText = '';
                            if (user.role === 'root') roleText = '管理员';
                            else if (user.role === 'user') roleText = '用户';
                            else roleText = '访客';
                            
                            // 如果是当前用户自己，特殊标记
                            let selfText = (user.username === currentUser.username) ? '（自己）' : '';
                            
                            option.textContent = `${user.real_name || user.username}${selfText} - ${roleText}（当前分数: ${user.score || 0}）`;
                            
                            // 如果是自己，特殊样式
                            if (user.username === currentUser.username) {
                                option.style.fontWeight = 'bold';
                                option.style.color = '#dc3545';
                            }
                            
                            userSelect.appendChild(option);
                        });
                        
                        permissionInfo.textContent = '管理员和普通用户可以扣任何人的分（包括自己）';
                        permissionInfo.style.color = '#28a745';
                    }
                }
            } catch (error) {
                console.error('加载用户失败:', error);
                showAlert('加载用户列表失败', 'error');
            }
        }
        
        function applyUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUser = urlParams.get('user');
            
            if (targetUser) {
                document.getElementById('target_user').value = targetUser;
            }
        }
        
        document.getElementById('image').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('imagePreview');
            
            if (file) {
                if (!file.type.match('image.*')) {
                    showAlert('请选择图片文件', 'error');
                    return;
                }
                
                if (file.size > 2 * 1024 * 1024) {
                    showAlert('图片大小不能超过2MB', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; max-height: 150px;">`;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                preview.classList.add('hidden');
            }
        });
        
        document.getElementById('deductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const targetUser = document.getElementById('target_user').value;
            const points = document.getElementById('points').value;
            const reason = document.getElementById('reason').value;
            const imageFile = document.getElementById('image').files[0];
            
            if (!targetUser || !points) {
                showAlert('请填写必填项', 'error');
                return;
            }
            
            const pointsNum = parseInt(points);
            if (pointsNum < 1 || pointsNum > 100) {
                showAlert('扣分分值必须在1-100之间', 'error');
                return;
            }
            
            const alertDiv = document.getElementById('alert');
            alertDiv.className = 'alert hidden';
            
            try {
                let imageBase64 = '';
                if (imageFile) {
                    imageBase64 = await fileToBase64(imageFile);
                }
                
                const requestData = {
                    target_user: targetUser,
                    points: pointsNum,
                    reason: reason,
                    operator: currentUser.username,
                    image: imageBase64
                };
                
                const response = await fetch('/api/deductions/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = `扣分成功！${targetUser} 被扣${points}分`;
                    
                    document.getElementById('deductForm').reset();
                    document.getElementById('imagePreview').classList.add('hidden');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    alertDiv.className = 'alert alert-error';
                    alertDiv.textContent = data.error || '扣分失败';
                }
            } catch (error) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '网络错误，请稍后重试';
            }
        });
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
        
        async function logout() {
            try {
                await fetch('/api/users/logout', {
                    method: 'POST'
                });
                window.location.href = 'login.html';
            } catch (error) {
                window.location.href = 'login.html';
            }
        }
        
        function showAlert(message, type = 'info') {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.className = 'alert hidden';
            }, 3000);
        }
        
        window.onload = checkLogin;
    </script>
</body>
</html>
