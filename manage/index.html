<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 器材组成员管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo">
                <h1>器材组成员管理系统</h1><a href="../index.html">返回首页</a>
            </div>
            <div class="nav-links">
                <span id="welcomeMessage"></span>
                <a href="profile.html" class="btn btn-secondary">个人资料</a>
                <button onclick="logout()" class="logout-btn">退出登录</button>
            </div>
        </div>
        
        <div id="alert" class="alert hidden"></div>
        
        <div class="header">
            <h2>仪表板</h2>
            <div id="roleInfo" class="user-info"></div>
        </div>
        
        <div id="dashboard" class="hidden">
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>当前用户</h3>
                    <div class="number" id="currentUsername">-</div>
                </div>
                <div class="dashboard-card">
                    <h3>总用户数</h3>
                    <div class="number" id="totalUsers">-</div>
                </div>
                <div class="dashboard-card">
                    <h3>扣分记录</h3>
                    <div class="number" id="totalDeductions">-</div>
                </div>
                <div class="dashboard-card">
                    <h3>用户权限</h3>
                    <div id="userRole">-</div>
                </div>
            </div>
            
            <div style="margin-top: 25px; text-align: center;">
                <a href="deduct.html" class="btn btn-success" id="deductBtn">我要扣分</a>
                <a href="admin.html" class="btn btn-secondary" id="adminBtn" style="display: none;">用户管理</a>
            </div>
            
            <div style="margin-top: 15px; text-align: center;">
                <small class="text-muted">
                    <strong>权限说明：</strong>
                    <span id="permissionInfo"></span>
                </small>
            </div>
            
            <div id="recentDeductions" style="margin-top: 25px;">
                <h3>最近扣分记录</h3>
                <div class="table-container">
                    <table id="deductionsTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>被扣分人</th>
                                <th>扣分分值</th>
                                <th>操作人</th>
                                <th>原因</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            加载中...
        </div>
    </div>

    <script>
        let currentUser = null;
        
        async function checkLogin() {
            try {
                const response = await fetch('/api/users/current');
                const data = await response.json();
                
                if (!data.username) {
                    window.location.href = 'login.html';
                    return;
                }
                
                currentUser = data;
                updateUI();
                loadDashboard();
            } catch (error) {
                window.location.href = 'login.html';
            }
        }
        
        function updateUI() {
            document.getElementById('welcomeMessage').textContent = 
                `欢迎，${currentUser.real_name || currentUser.username}`;
            
            document.getElementById('currentUsername').textContent = 
                currentUser.real_name || currentUser.username;
            
            const roleBadge = document.createElement('span');
            roleBadge.className = `role-badge role-${currentUser.role}`;
            roleBadge.textContent = 
                currentUser.role === 'root' ? '管理员' : 
                currentUser.role === 'user' ? '用户' : '访客';
            
            document.getElementById('roleInfo').innerHTML = '';
            document.getElementById('roleInfo').appendChild(roleBadge);
            
            document.getElementById('userRole').textContent = 
                currentUser.role === 'root' ? '管理员' : 
                currentUser.role === 'user' ? '用户' : '访客';
            
            // 设置权限说明
            const permissionInfo = document.getElementById('permissionInfo');
            if (currentUser.role === 'root') {
                permissionInfo.textContent = '您可以扣任何人的分（包括自己），可以管理用户';
                document.getElementById('deductBtn').style.display = 'inline-block';
                document.getElementById('adminBtn').style.display = 'inline-block';
            } else if (currentUser.role === 'user') {
                permissionInfo.textContent = '您可以扣任何人的分（包括自己）';
                document.getElementById('deductBtn').style.display = 'inline-block';
                document.getElementById('adminBtn').style.display = 'none';
            } else {
                permissionInfo.textContent = '您只能查看数据，不能扣分';
                document.getElementById('deductBtn').style.display = 'none';
                document.getElementById('adminBtn').style.display = 'none';
            }
        }
        
        async function loadDashboard() {
            try {
                const usersResponse = await fetch('/api/users/list');
                const usersData = await usersResponse.json();
                
                if (usersResponse.ok) {
                    document.getElementById('totalUsers').textContent = usersData.users?.length || 0;
                }
                
                const deductionsResponse = await fetch('/api/deductions/list');
                const deductionsData = await deductionsResponse.json();
                
                if (deductionsResponse.ok) {
                    const deductions = deductionsData.deductions || [];
                    document.getElementById('totalDeductions').textContent = deductions.length;
                    
                    const recentDeductions = deductions.slice(0, 10);
                    const tableBody = document.querySelector('#deductionsTable tbody');
                    tableBody.innerHTML = '';
                    
                    recentDeductions.forEach(deduction => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${deduction.time || '-'}</td>
                            <td>${deduction.target_user || '-'}</td>
                            <td class="score-positive">${deduction.points || '0'}</td>
                            <td>${deduction.operator || '-'}</td>
                            <td>${deduction.reason || '-'}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
            } catch (error) {
                showAlert('加载失败，请刷新页面', 'error');
            }
        }
        
        async function logout() {
            try {
                await fetch('/api/users/logout', {
                    method: 'POST'
                });
                window.location.href = 'login.html';
            } catch (error) {
                window.location.href = 'login.html';
            }
        }
        
        function showAlert(message, type = 'info') {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.className = 'alert hidden';
            }, 3000);
        }
        
        window.onload = checkLogin;
    </script>
</body>
</html>
