<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成员查询</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e6ed;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #4a6fa5;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-right: 20px;
        }
        
        .back-btn:hover {
            background-color: #3a5985;
            transform: translateX(-3px);
        }
        
        .title {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-top: 5px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .section {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            padding: 30px;
            transition: transform 0.3s ease;
        }
        
        .section:hover {
            transform: translateY(-5px);
        }
        
        .section-title {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e8f4ff;
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            margin-right: 10px;
            color: #4a6fa5;
        }
        
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .input-label {
            font-weight: 600;
            color: #2c3e50;
            min-width: 120px;
        }
        
        .input-field {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #4a6fa5;
        }
        
        .search-btn {
            background-color: #4a6fa5;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-start;
        }
        
        .search-btn:hover {
            background-color: #3a5985;
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.3);
        }
        
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .member-card {
            background-color: #f8fafc;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }
        
        .member-header {
            background-color: #4a6fa5;
            color: white;
            padding: 18px 20px;
        }
        
        .member-name {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }
        
        .member-image {
            object-fit: cover;
            display: block;
        }
        
        .member-info {
            padding: 20px;
        }
        
        .member-role {
            color: #4a6fa5;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .member-desc {
            color: #555;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e6ed;
            color: #7f8c8d;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .section {
                padding: 20px;
            }
            
            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
            
            .input-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .input-field {
                min-width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 24px;
            }
            
            .members-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="../index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h1 class="title">徐汇中学器材管理组 - 成员查询</h1>
            <p class="subtitle">欢迎访问</p>
        </div>
    </div>
    
    <div class="container">
        <!-- 查询区域 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-search"></i> 成员信息查询
            </h2>
            <div class="search-box">
                <div class="input-group">
                    <label class="input-label">成员编号：</label>
                    <input type="text" id="memberId" class="input-field" placeholder="请输入成员编号（入学年份+班级+学号）">
                </div>
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-check-circle"></i> 查询成员信息
                </button>
            </div>
        </div>
        
        <!-- 重要成员展示区域 -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-star"></i> 重要人物展示
            </h2>
            <div class="members-grid">
                <!-- 成员1 -->
                <div class="member-card">
                    <div class="member-header">
                        <h3 class="member-name">曹博豪</h3>
                    </div>
                    <a href="check.html?id=20231818"><img src="head/head_cao.jpg" width="350" height="350" class="member-image" id="member-img-1"></a>
                    <div class="member-info">
                        <div class="member-role">组长 | 器材总负责人</div>
                        <p class="member-desc">负责管理整个器材组，协调各部分工作</p>
                    </div>
                </div>
                
                
                
                
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>徐汇中学器材管理组 &copy; 2026 | 成员查询系统</p>
        <strong>本页面由AI生成</strong>
    </div>

    <script>

        
        // 查询按钮功能
        document.getElementById('searchBtn').addEventListener('click', function() {
            const memberId = document.getElementById('memberId').value.trim();
            
            if (!memberId) {
                alert('请输入成员编号！');
                document.getElementById('memberId').focus();
                return;
            }
            
            // 跳转到check.html并带上参数
            window.location.href = `check.html?id=${encodeURIComponent(memberId)}`;
        });
        
        // 输入框回车键支持
        document.getElementById('memberId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });
        
        
    </script>
</body>
</html>
